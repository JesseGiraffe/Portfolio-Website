<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPad Embed</title>
<script type="module"
  src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js">
</script>
<link rel="stylesheet" href="system.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    overflow: auto; /* allow scrolling inside iframe */
  }

  /* Single scrollable container for the whole page */
  .scroll-container {
    display: flex;
    gap: 20px;
    padding: 10px;
    box-sizing: border-box;
  }

  /* Left column */
  .left-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

   .model-container {
    background: var(--secondary); /* card background */
    border: 0.2em solid var(--secondary);
    border-radius: 4px;
    padding: 10px;
  }

  .model-container model-viewer {
    width: 100%;
    height: 500px; /* visible height for model */
  }

  .image-container img {
    width: 100%;
    height: auto;
    border-radius: 4px;
  }

  /* Right column (gray box) */
  .right-content {
    flex: 1;
    background: #f0f0f0;
    border: 0.2em solid var(--secondary);
    border-radius: 4px;
    padding: 20px;
    box-sizing: border-box;
  }

  /* Readable spacing */
  .right-content p, .right-content h2, .right-content h3 {
    margin-bottom: 1em;
  }
</style>
</head>
<body>

<div class="scroll-container">

  <!-- Left column -->
  <div class="left-content">
    <div class="model-container">
      <model-viewer
        src="models/Hanger.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        tone-mapping="neutral"
        shadow-intensity="1">
      </model-viewer>
    </div>

    <div class="image-container">
      <img src="photos/photo_hanger1.png" alt="Extra image">
    </div>
    
    <div class="image-container">
      <img src="photos/photo_hanger3.png" alt="Extra image">
    </div>
    <div class="image-container">
      <img src="photos/photo_hanger4.png" alt="Extra image">
    </div>
    <div class="image-container">
      <img src="photos/photo_hanger5" alt="Extra image">
    </div>
  </div>

  <!-- Right column (gray box) -->
<div class="right-content">
        <h2>Folding Hanger Project</h2>
    <h2>The Problem</h2>
   

    <h2>The Process</h2>
   
    <h2>The Results</h2>
   
   <div class="image-container">
      <img src="photos/photo_hanger2.png" alt="Extra image">
    </div>
 
  </div>

</div>

</body>
</html>
