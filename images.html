<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="system.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: sans-serif;
    }
    h1 { color: coral; }

    .grid-container {
      columns: 5 200px;
      column-gap: 1.5rem;
      width: 90%;
      margin: 0 auto;
    }
    .grid-container div {
      width: 100%;
      margin-bottom: 1.5rem;
      display: inline-block;
      border: solid 2px black;
      padding: 5px;
      box-shadow: 5px 5px 5px rgba(0,0,0,0.5);
      border-radius: 5px;
      transition: all .25s ease-in-out;
    }
    .grid-container div:hover { border-color: coral; }
    .grid-container img {
      width: 100%;
      border-radius: 5px;
      transition: all .25s ease-in-out;
      cursor: pointer;
    }
    .grid-container p {
      margin: 5px 0;
      padding: 0;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
<h1>Click Each Photo to Learn More!</h1>

<div class="grid-container">
  <div>
    <img src="photos/photo_ipad1.png" alt="Project 1" data-iframe="iPad_embed.html">
    <p>iPad Stand Redesign (FEA with SOLIDWORKS)</p>
  </div>
  <div>
    <img src="photos/photo_chair1.jpg" alt="Cardboard Chair Project" data-iframe="chair_embed.html">
    <p>Cardboard Chair Project/p>
  </div>
  <div>
    <img src="photos/SpriteLite.png" alt="Lamp Project (SpriteLite)" data-iframe="Lamp_embed.html">
    <p>(SpriteLite) Lamp Project</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1507146426996-ef05306b995a?ixlib=rb-1.2.1&w=400" alt="Project 4" data-iframe="iPad_embed_project4.html">
    <p>Project 4</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1530281700549-e82e7bf110d6?ixlib=rb-1.2.1&w=400" alt="Project 5" data-iframe="iPad_embed_project5.html">
    <p>Project 5</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?ixlib=rb-1.2.1&w=400" alt="Project 6" data-iframe="iPad_embed_project6.html">
    <p>Project 6</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1552053831-71594a27632d?ixlib=rb-1.2.1&w=400" alt="Project 7" data-iframe="iPad_embed_project7.html">
    <p>Project 7</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?ixlib=rb-1.2.1&w=400" alt="Project 8" data-iframe="iPad_embed_project8.html">
    <p>Project 8</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1535930891776-0c2dfb7fda1a?ixlib=rb-1.2.1&w=400" alt="Project 9" data-iframe="iPad_embed_project9.html">
    <p>Project 9</p>
  </div>
  <div>
    <img src="https://images.unsplash.com/photo-1504595403659-9088ce801e29?ixlib=rb-1.2.1&w=400" alt="Project 10" data-iframe="iPad_embed_project10.html">
    <p>Project 10</p>
  </div>
</div>

<script>
  document.querySelectorAll('img').forEach(img => {
    img.addEventListener('click', () => {
      // Scroll parent window to the top
      window.parent.scrollTo({ top: 0, behavior: 'smooth' });

      // Update floating window iframe and title in the parent
      const parentIframe = window.parent.document.querySelector('.window-pane iframe');
      const parentTitle = window.parent.document.querySelector('.window .title');
      if(parentIframe && parentTitle) {
        const src = img.dataset.iframe || img.src;
        parentIframe.src = src;
        parentTitle.textContent = img.alt;
      }
    });
  });
</script>

</body>
</html>
